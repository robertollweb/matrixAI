name: Bug report
description: Report a problem with MatrixAI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not report
        security vulnerabilities here — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or a `.mxai` snippet that triggers the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MatrixAI version
      description: Output of `matrixai --version` or the installed package version.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and whether optional deps (e.g. PyTorch) are installed.
    validations:
      required: false

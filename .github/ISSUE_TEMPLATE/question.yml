name: Question
description: Ask a question about using MatrixAI
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a question, please check the documentation and existing
        issues. For security concerns, see SECURITY.md instead.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to achieve? Include relevant details.
    validations:
      required: false
